name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed to create GitHub releases

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-arm64

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Stage install
        run: cmake --install build --prefix "stage/tuix-${{ github.ref_name }}-${{ matrix.target }}"

      - name: Package
        run: tar -czf "tuix-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" -C stage "tuix-${{ github.ref_name }}-${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuix-${{ github.ref_name }}-${{ matrix.target }}
          path: tuix-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
